name: Build and release

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  # ─── Tests (runs on every push/PR) ───────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test

  # ─── Installers (only on tags or manual dispatch) ────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14       # Apple Silicon runner — builds universal DMG
            platform_flag: --mac --x64 --arm64
            artifact_name: installer-mac
            artifact_glob: dist/*.dmg

          - os: windows-latest
            platform_flag: --win
            artifact_name: installer-win
            artifact_glob: dist/*.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Package installer
        run: npx electron-builder ${{ matrix.platform_flag }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  # ─── GitHub Release (only on tags) ───────────────────────────────────────────
  release:
    name: Attach installers to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
